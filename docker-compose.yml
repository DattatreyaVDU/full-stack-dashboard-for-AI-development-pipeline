version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-website-builder
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001

      # Where the React dashboard is allowed to connect from
      # Set to your NAS IP or domain, e.g. http://192.168.1.100:3001
      FRONTEND_URL: "*"

      # Path inside the container — mapped to NAS volume below
      PROJECTS_DIR: /projects

      # Persistent db.json storage
      DB_PATH: /app/data/db.json

      # n8n Chat Trigger URL
      N8N_CHAT_URL: https://n8nherbsrmworld.duckdns.org/webhook/6d8e1ecf-ed7a-42ba-82d7-160a3ee4b5e9/chat

      # Shared secret for webhook authentication (Fix #3)
      WEBHOOK_SECRET: change_this_to_a_random_secret

      # GitHub (optional)
      GITHUB_TOKEN: ""
      GITHUB_OWNER: ""
      GITHUB_REPO: ""
      GITHUB_BRANCH: main

      # FTP (optional)
      FTP_HOST: ""
      FTP_USER: ""
      FTP_PASS: ""
      FTP_REMOTE_PATH: /wp-content/themes

    volumes:
      # NAS projects folder — same path n8n writes to
      - /volume1/Workflows/Website-Generator/projects:/projects

      # Persistent db.json — survives container restarts
      - /volume1/Workflows/Website-Generator/data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
