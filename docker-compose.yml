version: '3.8'

services:

  # ── Dashboard (Express API + React frontend) ────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001

      # Change this to a long random string — used to sign JWT tokens
      JWT_SECRET: change_this_to_a_long_random_secret_123

      # Set this to your Cloudflare Tunnel public URL after you create it
      # Example: https://dashboard.yourdomain.com
      FRONTEND_URL: http://localhost:3001

      # Shared filesystem with n8n — files land here and File Explorer reads from here
      PROJECTS_DIR: /projects

      # Persistent storage for users.json and db.json
      DB_PATH: /app/data/db.json

      # n8n Chat Trigger webhook URL
      N8N_CHAT_URL: https://n8nherbsrmworld.duckdns.org/webhook/6d8e1ecf-ed7a-42ba-82d7-160a3ee4b5e9/chat

      # Email via Resend HTTP API (set SMTP_USER=resend, SMTP_PASS=your Resend API key)
      SMTP_USER: resend
      SMTP_PASS: ""
      SMTP_FROM: onboarding@resend.dev

      # Set to "true" to skip email verification (useful until you configure email)
      SKIP_EMAIL_VERIFICATION: "true"

      # GitHub (optional — for pushing generated files to a repo)
      GITHUB_TOKEN: ""
      GITHUB_OWNER: ""
      GITHUB_REPO: ""
      GITHUB_BRANCH: main

      # FTP (optional — for WordPress deployment)
      FTP_HOST: ""
      FTP_USER: ""
      FTP_PASS: ""
      FTP_REMOTE_PATH: /wp-content/themes

    volumes:
      # Shared with n8n — SAME path n8n writes project files to
      - /n8n_data/Website-Generator/projects:/projects

      # Persistent data — users.json and db.json survive restarts and updates
      - /n8n_data/Website-Generator/dashboard-data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Cloudflare Tunnel — gives the dashboard a public HTTPS URL ──────────────
  # How to get your token:
  #   1. Go to one.dash.cloudflare.com → Zero Trust → Networks → Tunnels
  #   2. Create a tunnel → give it a name (e.g. "nas-dashboard")
  #   3. Copy the token shown on the setup page
  #   4. Replace YOUR_TUNNEL_TOKEN_HERE below with that token
  #   5. In the tunnel settings, add a Public Hostname:
  #      Subdomain: dashboard  Domain: yourdomain.com  Service: http://dashboard:3001
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token YOUR_TUNNEL_TOKEN_HERE
    depends_on:
      - dashboard
